<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}{{ theme.title }}{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="/static/css/style.css">
  {% block extra_css %}{% endblock %}
  <style>
    :root {
      --primary: {{ theme.primaryColor }};
      --primary-dark: color-mix(in srgb, {{ theme.primaryColor }} 75%, #000);
      --primary-light: color-mix(in srgb, {{ theme.primaryColor }} 15%, #fff);
      --primary-subtle: color-mix(in srgb, {{ theme.primaryColor }} 8%, #fff);
      {% if theme.fontFamily %}--font: {{ theme.fontFamily }};{% endif %}
    }
  </style>
  {% if theme.customCssPath %}<link rel="stylesheet" href="{{ theme.customCssPath }}">{% endif %}
</head>
<body>
  <nav class="navbar">
    <a href="/" class="navbar-brand">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
        <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
      </svg>
      <span>{{ theme.title }}</span>
    </a>
    <div class="navbar-right">
      {% block navbar_extra %}{% endblock %}
    </div>
  </nav>

  <main class="main-content">
    {% block content %}{% endblock %}
  </main>

  {% if theme.customJsPath %}<script src="{{ theme.customJsPath }}"></script>{% endif %}
</body>
</html>

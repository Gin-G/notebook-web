apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "notebook-gallery.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "notebook-gallery.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  revisionHistoryLimit: {{ .Values.revisionHistoryLimit | default 3 }}
  {{- if and .Values.persistence.enabled (eq .Values.persistence.accessMode "ReadWriteOnce") }}
  strategy:
    type: Recreate
  {{- end }}
  selector:
    matchLabels:
      {{- include "notebook-gallery.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        # Force pod restart when config changes
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "notebook-gallery.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "notebook-gallery.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- if .Values.templateOverrides }}
      initContainers:
        - name: fetch-template-overrides
          image: {{ .Values.templateOverrideFetcherImage | quote }}
          command: ["sh", "-c"]
          args:
            - |
              mkdir -p /overrides
              {{- range $name, $url := .Values.templateOverrides }}
              echo "Fetching {{ $name }}"
              curl -fsSL --max-time 15 {{ $url | quote }} -o /overrides/{{ $name }} \
                || echo "WARN: skipped {{ $name }} (fetch failed, falling back to bundled)"
              {{- end }}
              echo "Template override fetch complete"
              ls -la /overrides
          volumeMounts:
            - name: template-overrides
              mountPath: /overrides
      {{- end }}
      containers:
        - name: notebook-gallery
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: CONFIG_PATH
              value: /etc/notebook-gallery/config.json
            {{- if .Values.templateOverrides }}
            - name: TEMPLATE_OVERRIDE_DIR
              value: /etc/notebook-gallery/templates-overrides
            {{- end }}
          volumeMounts:
            - name: config
              mountPath: /etc/notebook-gallery
              readOnly: true
            - name: notebook-cache
              mountPath: {{ .Values.cacheDir }}
            {{- if .Values.templateOverrides }}
            - name: template-overrides
              mountPath: /etc/notebook-gallery/templates-overrides
              readOnly: true
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /api/notebooks
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/notebooks
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
      volumes:
        - name: config
          configMap:
            name: {{ include "notebook-gallery.fullname" . }}-config
        - name: notebook-cache
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "notebook-gallery.fullname" . }}-cache
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- if .Values.templateOverrides }}
        - name: template-overrides
          emptyDir: {}
        {{- end }}

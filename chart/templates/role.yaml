apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "notebook-gallery.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "notebook-gallery.labels" . | nindent 4 }}
rules:
  # Session pod lifecycle
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["create", "delete", "get", "list", "watch"]
  # Pod logs (optional: for debugging session pods)
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get", "list"]

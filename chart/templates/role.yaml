apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "notebook-gallery.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "notebook-gallery.labels" . | nindent 4 }}
rules:
  # Session pod lifecycle
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["create", "delete", "get", "list", "watch"]
  # Pod logs (optional: for debugging session pods)
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get", "list"]
  # Image build jobs (repo2docker)
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "delete", "get", "list", "watch"]
  # Image build cache (persists built image names across restarts)
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["create", "get", "patch", "update"]
  # Registry push secret (read-only)
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]

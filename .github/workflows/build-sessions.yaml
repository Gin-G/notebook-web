name: Build Session Images

on:
  push:
    branches: [main]
    paths:
      - "chart/values.yaml"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-sessions:
    name: repo2docker build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # fetch full history so we can commit back
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install repo2docker and ruamel.yaml
        run: pip install jupyter-repo2docker ruamel.yaml

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push session images
        env:
          REGISTRY: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/sessions
        run: python scripts/build_session_images.py

      - name: Commit updated image tags
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add chart/values.yaml
          git diff --cached --quiet || git commit -m "chore: update session image tags [skip ci]"
          git push
